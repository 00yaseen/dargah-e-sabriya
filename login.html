<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Court Work Manager Login</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: "Inter", sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 380px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border-radius: 10px;
        }

        .login-header {
            background: #1f2a44;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }

        .password-toggle {
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="box login-box">

        <div class="login-header">

            <h1 class="title is-5 has-text-white">Court Work Manager</h1>
            <p class="is-size-7">Secure Login</p>

        </div>

        <div class="p-5">

            <div class="field">

                <label class="label">Username</label>

                <div class="control">
                    <input class="input" type="text" id="username" placeholder="Enter username">
                </div>

            </div>


            <div class="field">

                <label class="label">Password</label>

                <div class="control has-icons-right">

                    <input class="input" type="password" id="password" placeholder="Enter password">

                    <span class="icon is-small is-right password-toggle" onclick="togglePassword()">
                        👁
                    </span>

                </div>

            </div>


            <div class="field">

                <button class="button is-dark is-fullwidth" onclick="login()">
                    Login
                </button>

            </div>

            <p id="error" class="has-text-danger has-text-centered is-size-7"></p>

        </div>

    </div>


    <script>

        function login() {

            let username = document.getElementById("username").value.toLowerCase().trim();
            let password = document.getElementById("password").value.toLowerCase().trim();

            if (
                (username === "yaseen" && password === "dargah") ||
                (username === "bakhtavar" && password === "dargah")
            ) {

                sessionStorage.setItem("loggedIn", "true");

                window.location.href = "dashboard.html";

            } else {

                document.getElementById("error").innerText = "Invalid username or password";

            }

        }


        /* SHOW HIDE PASSWORD */

        function togglePassword() {

            let pass = document.getElementById("password");

            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }

        }

        document.addEventListener("keypress", function (e) {

            if (e.key === "Enter") {
                login();
            }

        });

    </script>

</body>

</html>
